name: Sync Coding Profiles

on:
  schedule:
    # Every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-coding-profiles
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync CodinGame & HackerRank stats
        id: sync
        run: node scripts/sync-coding-profiles.mjs

      - name: Commit changes if any
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/hackerrank-card.svg
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "chore: sync CodinGame & HackerRank stats"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram
        if: success() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          MESSAGE=$(printf '✅ Coding profiles synced (%s)\n\n🎮 CodinGame: rank #%s · top %s%% · %s league\n🏅 HackerRank: level %s · %s badges · %s certifications\n📝 README updated: %s' \
            "$(date -u +'%Y-%m-%d %H:%M UTC')" \
            "${{ steps.sync.outputs.codingame_rank }}" \
            "${{ steps.sync.outputs.codingame_percent }}" \
            "${{ steps.sync.outputs.codingame_league }}" \
            "${{ steps.sync.outputs.hackerrank_level }}" \
            "${{ steps.sync.outputs.hackerrank_badges }}" \
            "${{ steps.sync.outputs.hackerrank_certifications }}" \
            "${{ steps.commit.outputs.changed }}")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --fail
